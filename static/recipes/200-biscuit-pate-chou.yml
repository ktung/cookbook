name:
  en: 200 - Biscuit pate à chou
  fr: 200 - Biscuit pate à chou
ingredients:
  - name: milk
    percentage: 125
  - name: butter
    percentage: 90
  - name: allPurposeFlour
    percentage: 135
  - name: egg
    percentage: 100
  - name: eggYolk
    percentage: 150
  - name: eggWhite
    percentage: 225
  - name: whiteSugar
    percentage: 110
presetTotalIngredient: 468
process:
  fr: |
    - Préchauffer le four à 200°C.

    - Clarifier une partie des oeufs
    - Faire fondre le beurre avec le lait, porter à ébullition
    - Hors du feu, ajouter la farine en une fois, 
    - Remettre sur le feu pour désécher la panade
    - Hors du feu, ajouter petit à petit le mélange oeuf entier + jaune d'oeuf

    - Monter les 3 blancs d’œufs et serrer avec le sucre semoule, arrêter la meringue lorsque la texture est encore souple.
    - Ajouter un peu de blancs montés à la pâte à choux et mélanger.
    - Incorporer ensuite délicatement le reste des blancs montés à l’aide d’une maryse.

    - Verser la préparation sur 1 plaque de 30×40 cm recouverte d’une feuille de papier cuisson et étaler à l’aide d’une spatule.
    - Cuisson 200°C ventilé 10 minutes
    - À la sortie du four, vérifier la cuisson de votre biscuit à l’aide d’un couteau puis le laisser refroidir et le saupoudrer de sucre glace pour le décoller plus facilement du papier cuisson.
notes:
  fr: |
    - ou biscuit japonais
    - 1 blanc oeuf ~= 30g
references:
  - https://www.instagram.com/p/DSQHHHAiKm4/
